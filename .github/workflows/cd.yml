name: CD

# Continuous delivery: build the container once, publish it to GitHub Container
# Registry (GHCR), and produce a deployable, immutable artifact that ANY target
# (k8s, Railway, Render, a VPS) can pull. The actual "deploy to <env>" step is
# intentionally not here yet — it's gated on the deploy-target decision. Until
# then this gives us versioned images:
#   ghcr.io/<owner>/<repo>:<branch>   ghcr.io/<owner>/<repo>:sha-<short>
#   ghcr.io/<owner>/<repo>:vX.Y.Z     ghcr.io/<owner>/<repo>:latest  (main only)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}   # allow manual re-publish from the Actions tab

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a publish midway

jobs:
  # Fast standalone gate so CD never publishes an untested image, regardless of
  # whether it was triggered by a branch push or a release tag. The heavier
  # scans (Trivy, semgrep, gitleaks) run in parallel in ci.yml.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npx jest --ci

  publish-image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # required to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # github.repository can contain uppercase; GHCR image names must be
      # lowercase. Normalise it once here.
      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
