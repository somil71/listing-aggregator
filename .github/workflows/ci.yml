name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd dashboard && npm ci
      - name: TypeScript check (dashboard)
        run: cd dashboard && npx tsc --noEmit
      - name: ESLint
        run: |
          npx eslint src/ --ext .js --max-warnings 0 || true
          cd dashboard && npx eslint src/ --ext .ts,.tsx --max-warnings 0 || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Unit tests
        run: npm test --if-present
      - name: Smoke tests
        run: npm run test:smoke --if-present

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Audit backend
        run: npm audit --audit-level=high --production
      - name: Audit dashboard
        run: cd dashboard && npm audit --audit-level=high --production

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [lint-and-typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: cd dashboard && npm ci && npm run build
      - name: Verify backend boots
        run: |
          node -e "require('./src/api/server.js');" &
          PID=$!
          sleep 5
          curl -fsS http://localhost:3000/health
          kill $PID
        env:
          DATABASE_URL: postgresql://stub
          NODE_ENV: development

  docker-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t property-digest:ci .
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: property-digest:ci
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=p/owasp-top-ten --config=p/javascript --config=p/typescript --config=p/nodejs --config=p/react
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
