apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-digest-worker
  namespace: property-digest
  labels:
    app: property-digest-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: property-digest-worker
  template:
    metadata:
      labels:
        app: property-digest-worker
    spec:
      containers:
        - name: worker
          image: property-digest:latest
          imagePullPolicy: Always
          command: ["node", "src/worker/parseWorker.js"]
          envFrom:
            - configMapRef:
                name: property-digest-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: DATABASE_URL
            - name: UPSTASH_REDIS_REST_URL
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: UPSTASH_REDIS_REST_URL
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: UPSTASH_REDIS_REST_TOKEN
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: GROQ_API_KEY
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: property-digest-data
