apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-digest
  namespace: property-digest
  labels:
    app: property-digest
    version: latest
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime deploy
  selector:
    matchLabels:
      app: property-digest
  template:
    metadata:
      labels:
        app: property-digest
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "3000"
        prometheus.io/path:   "/api/v1/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: app
          image: property-digest:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000

          envFrom:
            - configMapRef:
                name: property-digest-config
          env:
            - name: CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: CLERK_PUBLISHABLE_KEY
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: CLERK_SECRET_KEY
            - name: CLERK_JWT_KEY
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: CLERK_JWT_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: DATABASE_URL
            - name: UPSTASH_REDIS_REST_URL
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: UPSTASH_REDIS_REST_URL
            - name: UPSTASH_REDIS_REST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: property-digest-secrets
                  key: UPSTASH_REDIS_REST_TOKEN

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "2Gi"

          livenessProbe:
            httpGet:
              path: /live   # cheap, never fails on transient DB blips
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready  # includes DB connectivity + breaker state
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /live
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs

          # Chrome runs with --no-sandbox / --disable-setuid-sandbox (see whatsapp-client.js)
          # so SYS_ADMIN is not required.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: property-digest-data
        - name: logs
          persistentVolumeClaim:
            claimName: property-digest-logs
