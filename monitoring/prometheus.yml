global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'property-digest'
    env:     'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts.yml'

scrape_configs:
  # Property Digest API — metrics are token-gated (METRICS_TOKEN in the app's
  # env). Prometheus sends that same token as a Bearer credential read from a
  # mounted secret file, so the scrape authenticates instead of getting 401/404.
  # Provision the file (e.g. a k8s Secret or docker secret) with the exact value
  # of METRICS_TOKEN; if METRICS_TOKEN is unset the endpoint is disabled (404).
  - job_name: 'property-digest'
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/v1/metrics'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter (host OS metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
